name: laundryin
description: "Aplikasi LaundryIN untuk UTS"
publish_to: 'none'
version: 1.0.1+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  supabase_flutter: ^2.8.4
  intl: ^0.20.3
  file_picker: ^12.0.0-beta.7
  google_fonts: ^8.2.0
  package_info_plus: ^10.2.1
  http: ^1.6.0
  url_launcher: ^6.3.2
  image_picker: ^1.2.3
  image_cropper: ^12.2.1
  uuid: ^4.6.0
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/logo.png
